services:
  mysql:
    image: mysql:5.7
    container_name: mysql
    environment:
      MYSQL_PASSWORD: admin
      MYSQL_USER: admin
      MYSQL_ROOT_PASSWORD: admin
      MYSQL_DATABASE: tws_db
    networks: 
      - twotier
    volumes:
      - ./mysql_data_new:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD","mysqladmin","ping","-h","localhost","-uroot","-padmin"]
      interval: 10s
      retries: 5
      start_period: 60s
      timeout: 5s

  flaskapp:
    build:
      context: .
    container_name: flaskapp
    environment:
      MYSQL_PASSWORD: admin
      MYSQL_USER: root
      MYSQL_ROOT_PASSWORD: admin
      MYSQL_HOST: mysql
      MYSQL_DB: tws_db
    networks:
      - twotier
    ports:
      - "5000:5000"
    depends_on:
      - mysql
    restart: always
        
networks:
  twotier:

volumes:
  mysql_data_new:

